name: "京东屏蔽直播"
description: "仅屏蔽京东直播相关功能（购物页内嵌直播间、视频流等），其他功能全部放行"
author: "minis"
icon: "video.slash"
homepage: "https://doc.egernapp.com"
manual: "https://doc.egernapp.com/zh-CN/docs/configuration/modules"

rules:
  # ════════════════════════════════════════════════
  # 京东直播 - 主页
  # ════════════════════════════════════════════════
  - domain_suffix:
      match: zhibo.jd.com
      policy: REJECT
  - domain_suffix:
      match: zhibo.m.jd.com
      policy: REJECT
  - domain_suffix:
      match: live.m.jd.com
      policy: REJECT
  - domain_suffix:
      match: live.jd.com
      policy: REJECT

  # ════════════════════════════════════════════════
  # 京东直播 - 实时推送 / WebSocket
  # ════════════════════════════════════════════════
  - domain_suffix:
      match: live-ws2.jd.com
      policy: REJECT

  # ════════════════════════════════════════════════
  # 京东直播 - 流媒体拉流 / CDN
  # ════════════════════════════════════════════════
  - domain_suffix:
      match: zt-pull-ai.jdcloud.com
      policy: REJECT
  - domain_suffix:
      match: zt-pull.jdcloud.com
      policy: REJECT
  - domain_suffix:
      match: discover.300hu.com
      policy: REJECT

  # ════════════════════════════════════════════════
  # 京东直播 - 资源 & 缩略图
  # ════════════════════════════════════════════════
  - domain_suffix:
      match: live.360buyimg.com
      policy: REJECT
  - domain_suffix:
      match: live.360buyimg.cn
      policy: REJECT
  # m.360buyimg.com/live/ - 直播间封面图
  - url_regex:
      match: "^https://m\\.360buyimg\\.com/live/"
      policy: REJECT
  - url_regex:
      match: "^https://img\\d*\\.360buyimg\\.com/livecms/"
      policy: REJECT

  # ════════════════════════════════════════════════
  # 京东视频广告
  # ════════════════════════════════════════════════
  - domain_suffix:
      match: vod.300hu.com
      policy: REJECT
  - domain_suffix:
      match: jvod.300hu.com
      policy: REJECT
