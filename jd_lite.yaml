name: "京东精简"
description: "屏蔽购物页直播、看了又看、为你推荐、优惠随手买、活动专区、动画特效"
author: "minis"
icon: "video.slash"
homepage: "https://doc.egernapp.com"
manual: "https://doc.egernapp.com/zh-CN/docs/configuration/modules"

rules:
  # ════════════════════════════════════════════════
  # 京东直播 - 主页 / 直播域
  # ════════════════════════════════════════════════
  - domain_suffix:
      match: zhibo.jd.com
      policy: REJECT
  - domain_suffix:
      match: zhibo.m.jd.com
      policy: REJECT
  - domain_suffix:
      match: live.m.jd.com
      policy: REJECT
  - domain_suffix:
      match: live.jd.com
      policy: REJECT

  # ════════════════════════════════════════════════
  # 京东直播 - WebSocket / FLV 拉流 / 转码
  # ════════════════════════════════════════════════
  - domain_suffix:
      match: live-ws2.jd.com
      policy: REJECT
  - domain_suffix:
      match: zt-pull-ai.jdcloud.com
      policy: REJECT
  - domain_suffix:
      match: zt-pull.jdcloud.com
      policy: REJECT
  - domain_suffix:
      match: discover.300hu.com
      policy: REJECT

  # ════════════════════════════════════════════════
  # 直播封面图 / 直播动图
  # ════════════════════════════════════════════════
  - url_regex:
      match: "^https://m\\.360buyimg\\.com/live/"
      policy: REJECT
  - url_regex:
      match: "^https://img\\d*\\.360buyimg\\.com/livecms/"
      policy: REJECT

  # ════════════════════════════════════════════════
  # 视频广告
  # ════════════════════════════════════════════════
  - domain_suffix:
      match: vod.300hu.com
      policy: REJECT
  - domain_suffix:
      match: jvod.300hu.com
      policy: REJECT

  # ════════════════════════════════════════════════
  # 看了又看 / 为你推荐 / 活动专区（occupy-home 功能模块）
  # userGrowth=为你推荐  realPhotoRec=AI识货  barcode=扫码
  # trafficRisk=风控（不影响购物，可屏蔽）
  # ════════════════════════════════════════════════
  - url_regex:
      match: "^https://storage\\.360buyimg\\.com/occupy-home/"
      policy: REJECT

  # ════════════════════════════════════════════════
  # 活动专区 / 首页营销皮肤
  # ════════════════════════════════════════════════
  - url_regex:
      match: "^https://storage\\.360buyimg\\.com/mobileskin/"
      policy: REJECT

  # ════════════════════════════════════════════════
  # 优惠随手买 / 砸金蛋 / 购物车活动 / 桃花
  # ════════════════════════════════════════════════
  - url_regex:
      match: "^https://storage\\.360buyimg\\.com/appcartsoa/"
      policy: REJECT
  - url_regex:
      match: "^https://storage\\.360buyimg\\.com/app\\.m\\.jd\\.com/lottie/"
      policy: REJECT
  - url_regex:
      match: "^https://storage\\.360buyimg\\.com/sunglasses-push-msg/"
      policy: REJECT

  # ════════════════════════════════════════════════
  # 首页活动工具资源
  # ════════════════════════════════════════════════
  - url_regex:
      match: "^https://arvr-img\\.300hu\\.com/home_tools_resource/"
      policy: REJECT
