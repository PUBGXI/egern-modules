name: "京东屏蔽直播"
description: "仅屏蔽京东直播相关功能（购物页内嵌直播间、视频流等），其他功能全部放行"
author: "minis"
icon: "video.slash"
homepage: "https://doc.egernapp.com"
manual: "https://doc.egernapp.com/zh-CN/docs/configuration/modules"

rules:
  # ════════════════════════════════════════════════
  # 京东直播 - 主页
  # ════════════════════════════════════════════════
  - domain_suffix:
      match: zhibo.jd.com
      policy: REJECT
  - domain_suffix:
      match: zhibo.m.jd.com
      policy: REJECT
  - domain_suffix:
      match: live.m.jd.com
      policy: REJECT
  - domain_suffix:
      match: live.jd.com
      policy: REJECT

  # ════════════════════════════════════════════════
  # 京东直播 - 资源 & 流媒体
  # ════════════════════════════════════════════════
  - domain_suffix:
      match: live.360buyimg.com
      policy: REJECT
  - domain_suffix:
      match: live.360buyimg.cn
      policy: REJECT

  # ════════════════════════════════════════════════
  # 京东直播 - 视频 CDN
  # ════════════════════════════════════════════════
  - domain_suffix:
      match: vcdn.jd.com
      policy: REJECT
  - domain_suffix:
      match: vstatic.jd.com
      policy: REJECT

  # ════════════════════════════════════════════════
  # 购物页内嵌直播间
  # ════════════════════════════════════════════════
  - domain_suffix:
      match: channel.jd.com
      policy: REJECT

  # ════════════════════════════════════════════════
  # 京东视频广告
  # ════════════════════════════════════════════════
  - domain_suffix:
      match: vod.300hu.com
      policy: REJECT
  - domain_suffix:
      match: jvod.300hu.com
      policy: REJECT
